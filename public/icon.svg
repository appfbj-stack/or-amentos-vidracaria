<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- window frame -->
  <rect x="80" y="100" width="352" height="312" rx="16" fill="none" stroke="#fff" stroke-width="20"/>
  <!-- cross bars -->
  <line x1="256" y1="100" x2="256" y2="412" stroke="#fff" stroke-width="12"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#fff" stroke-width="12"/>
  <!-- glass reflection -->
  <path d="M120 140 Q180 180 240 140" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="8" stroke-linecap="round"/>
</svg>
